name: Build .RCL Executor

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Pro Version
        run: npm run build:pro
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Free Version
        run: npm run build:free
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rcl-executor-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/rcl-executor-macos-latest/*.dmg
            dist/rcl-executor-macos-latest/*.zip
            dist/rcl-executor-windows-latest/*.exe
          tag_name: ${{ github.ref == 'refs/heads/main' && format('v1.0.{0}-beta', github.run_number) || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && format('RCL Executor v1.0.{0} Beta', github.run_number) || format('RCL Executor {0}', github.ref_name) }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
