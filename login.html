<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Travelify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5A5F;
            --secondary: #00A699;
            --dark: #1a1a1a;
            --text: #222222;
            --text-muted: #717171;
            --bg: #f7f7f7;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
        }

        .content-left {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #ffffff;
            z-index: 10;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text);
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.2s;
            background: #fcfcfc;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 90, 95, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #e04b50;
        }

        .or-divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #bbb;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .or-divider::before, .or-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #eee;
            margin: 0 15px;
        }

        .social-logins {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .btn-social:hover {
            background: #f9f9f9;
        }

        .content-right {
            flex: 1.2;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            color: #ffffff;
            padding: 60px;
            position: relative;
        }

        .content-right::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
        }

        .perex {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }

        .perex h2 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 800;
            line-height: 1.1;
        }

        .perex p {
            font-size: 18px;
            opacity: 0.9;
        }

        .error-message {
            color: var(--primary);
            font-size: 13px;
            margin-top: 8px;
            display: none;
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .content-right { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-left">
            <div class="login-box">
                <a href="index.html" style="text-decoration: none; color: var(--primary); font-weight: 800; font-size: 20px; display: block; margin-bottom: 40px;">
                    <i class="fas fa-paper-plane"></i> TRAVELIFY
                </a>
                <h1 id="formTitle">Welcome back</h1>
                <p id="formSubtitle">Log in to your account to continue your journey.</p>
                
                <form id="authForm">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input class="form-control" name="email" id="email" type="email" required placeholder="name@example.com">
                        <div class="error-message" id="emailError">Email already in use</div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input class="form-control" name="password" id="password" type="password" required placeholder="••••••••">
                        <div class="error-message" id="loginError">Invalid email or password</div>
                    </div>
                    
                    <button class="btn-primary" id="submitBtn" type="submit">Continue</button>
                </form>

                <div class="or-divider">or continue with</div>

                <div class="social-logins">
                    <button class="btn-social" id="googleLogin">
                        <i class="fab fa-google" style="color: #4285F4;"></i> Google
                    </button>
                    <button class="btn-social" id="githubLogin">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>

                <div style="margin-top: 30px; text-align: center; font-size: 14px; color: var(--text-muted);">
                    Don’t have an account? <a href="#" id="toggle-signup" style="color: var(--primary); font-weight: 700; text-decoration: none;">Sign up</a>
                </div>
            </div>
        </div>
        <div class="content-right">
            <div class="perex">
                <h2>Explore the world's <br>most beautiful places</h2>
                <p>Join over 1 million travelers finding their perfect getaway with Travelify.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            GithubAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const toggleBtn = document.getElementById('toggle-signup');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailError = document.getElementById('emailError');
        const loginError = document.getElementById('loginError');
        
        let isLogin = true;

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Welcome back' : 'Create an account';
            formSubtitle.textContent = isLogin ? 'Log in to your account to continue your journey.' : 'Join Travelify today and start exploring.';
            submitBtn.textContent = isLogin ? 'Continue' : 'Create account';
            toggleBtn.textContent = isLogin ? 'Sign up' : 'Sign in';
            emailError.style.display = 'none';
            loginError.style.display = 'none';
            authForm.reset();
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            emailError.style.display = 'none';
            loginError.style.display = 'none';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = './index.html';
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        email: email,
                        createdAt: new Date().toISOString(),
                        role: 'user'
                    });
                    window.location.href = './index.html';
                }
            } catch (error) {
                console.error("Auth Error:", error);
                if (error.code === 'auth/email-already-in-use') {
                    emailError.style.display = 'block';
                } else {
                    loginError.textContent = error.message;
                    loginError.style.display = 'block';
                }
            }
        });

        async function handleSocialLogin(provider) {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    displayName: user.displayName,
                    photoURL: user.photoURL,
                    createdAt: new Date().toISOString(),
                    role: 'user'
                }, { merge: true });
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Social Login Error:", error);
                alert("Login failed: " + error.message);
            }
        }

        document.getElementById('googleLogin').onclick = () => handleSocialLogin(new GoogleAuthProvider());
        document.getElementById('githubLogin').onclick = () => handleSocialLogin(new GithubAuthProvider());
    </script>
</body>
</html>
