<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCL Executor (Free)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0a;
            --surface: #121212;
            --border: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
        }

        .titlebar {
            height: 35px;
            background: #0d0d0d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            -webkit-app-region: drag;
            border-bottom: 1px solid var(--border);
        }

        .titlebar .logo {
            font-size: 10px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .window-controls {
            display: flex;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .control-btn {
            font-size: 14px;
            color: #444;
            cursor: pointer;
            transition: 0.2s;
        }

        .control-btn:hover { color: #fff; }
        .close:hover { color: #ff4d4d; }

        .editor-container {
            flex: 1;
            display: flex;
            background: #0d0d0d;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #bbb;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 15px;
            resize: none;
            line-height: 1.5;
            user-select: text;
        }

        .actionbar {
            height: 50px;
            background: #0d0d0d;
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .btn {
            padding: 8px 15px;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .btn-exec { background: var(--primary); color: #000; }
        .btn-exec:hover { transform: translateY(-1px); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        
        .btn-sec { background: #1a1a1a; color: #888; border: 1px solid var(--border); }
        .btn-sec:hover { background: #222; color: #fff; }

        .status {
            margin-left: auto;
            display: flex;
            gap: 15px;
        }

        .status-dot {
            font-size: 9px;
            font-weight: 700;
            color: #444;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot.active { color: var(--primary); }
        .status-dot i { font-size: 7px; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="titlebar">
        <div class="logo">RCL FREE</div>
        <div class="window-controls">
            <i class="fas fa-minus control-btn" id="min-btn"></i>
            <i class="fas fa-times control-btn close" id="cls-btn"></i>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor" spellcheck="false" placeholder="-- Paste your script here..."></textarea>
    </div>

    <!-- NEW: CONSOLE SECTION -->
    <div id="console-output" style="height: 100px; background: #080808; border-top: 1px solid var(--border); overflow-y: auto; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888;">
        Waiting for Roblox logs...
    </div>

    <div class="actionbar">
        <button class="btn btn-exec" id="inject-btn">
            <i class="fas fa-syringe"></i> INJECT
        </button>
        <button class="btn btn-exec" id="exec-btn">
            <i class="fas fa-play"></i> EXECUTE
        </button>
        <button class="btn btn-sec" id="clr-btn">
            <i class="fas fa-eraser"></i> CLEAR
        </button>
        <button class="btn btn-sec" id="sav-btn">
            <i class="fas fa-save"></i> SAVE
        </button>
        <button class="btn btn-sec" id="loader-btn">
            <i class="fas fa-link"></i> LOADER
        </button>

        <div class="status">
            <div class="status-dot" id="rbx-status">
                <i class="fas fa-circle"></i> ROBLOX
            </div>
            <div class="status-dot" id="ready-status">
                <i class="fas fa-circle"></i> DISCONNECTED
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const editor = document.getElementById('editor');
        const execBtn = document.getElementById('exec-btn');
        const injectBtn = document.getElementById('inject-btn');
        const rbxStatus = document.getElementById('rbx-status');
        const readyStatus = document.getElementById('ready-status');
        const consoleOutput = document.getElementById('console-output');

        let isInjected = false;

        injectBtn.onclick = async () => {
            if (isInjected) return;
            injectBtn.disabled = true;
            injectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ...';

            const injectionTimeout = setTimeout(() => {
                if (!isInjected) {
                    injectBtn.disabled = false;
                    injectBtn.innerHTML = '<i class="fas fa-syringe"></i> INJECT';
                    alert('Injection timed out! \n\nGo to System Settings > Privacy & Security > Accessibility and make sure the app is allowed to control your computer.');
                }
            }, 10000);

            const res = await ipcRenderer.invoke('inject-standalone');
            clearTimeout(injectionTimeout);

            if (!res.success) {
                alert('Error: ' + res.error);
                injectBtn.disabled = false;
                injectBtn.innerHTML = '<i class="fas fa-syringe"></i> INJECT';
            } else {
                console.log('Successfully sent to: ' + res.process);
            }
        };

        ipcRenderer.on('roblox-log', (event, line) => {
            if (consoleOutput.innerHTML.includes('Waiting for Roblox logs...')) consoleOutput.innerHTML = '';
            const entry = document.createElement('div');
            entry.style.color = '#fff';
            entry.style.marginBottom = '2px';
            entry.textContent = `> ${line}`;
            
            if (line.includes('Error:')) entry.style.color = '#ff4d4d';
            
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        });

        ipcRenderer.on('server-log', (event, msg) => {
            if (consoleOutput.innerHTML.includes('Waiting for Roblox logs...')) consoleOutput.innerHTML = '';
            const entry = document.createElement('div');
            entry.style.color = '#ff00ff';
            entry.style.marginBottom = '2px';
            entry.textContent = `[SERVER] ${msg}`;
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        });

        document.getElementById('cls-btn').onclick = () => ipcRenderer.send('close-app');
        document.getElementById('min-btn').onclick = () => ipcRenderer.send('minimize-app');

        document.getElementById('clr-btn').onclick = () => editor.value = '';

        document.getElementById('sav-btn').onclick = async () => {
            const res = await ipcRenderer.invoke('save-file', { 
                name: 'Script', 
                content: editor.value 
            });
            if (res.success) alert('Saved!');
        };

        document.getElementById('loader-btn').onclick = async () => {
            const loader = await ipcRenderer.invoke('get-loader');
            if (loader) {
                navigator.clipboard.writeText(loader);
                alert('Connection Script Copied! Paste this into Roblox Studio (or another executor) and run it to connect to this app.');
            }
        };

        execBtn.onclick = async () => {
            await ipcRenderer.invoke('execute-script', editor.value);
        };

        // Sync Status
        setInterval(async () => {
            const isRunning = await ipcRenderer.invoke('check-roblox');
            const isLoaderActive = await ipcRenderer.invoke('check-loader-status');
            
            if (isRunning) rbxStatus.classList.add('active');
            else rbxStatus.classList.remove('active');
            
            if (isLoaderActive) {
                readyStatus.classList.add('active');
                readyStatus.innerHTML = '<i class="fas fa-circle"></i> CONNECTED';
                isInjected = true;
                injectBtn.innerHTML = '<i class="fas fa-check"></i> OK';
                injectBtn.disabled = true;
            } else {
                readyStatus.classList.remove('active');
                readyStatus.innerHTML = '<i class="fas fa-circle"></i> DISCONNECTED';
                isInjected = false;
                injectBtn.innerHTML = '<i class="fas fa-syringe"></i> INJECT';
                injectBtn.disabled = false;
            }
        }, 2000);
    </script>
</body>
</html>
