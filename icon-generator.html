<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .icon-container {
            width: 512px;
            height: 512px;
            background: #0d0d0d;
            border-radius: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 2px solid #1a1a1a;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }
        .logo-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.6));
        }
        .R {
            font-size: 280px;
            color: #00ff88;
            letter-spacing: -10px;
        }
        .l {
            font-size: 140px;
            color: #00ff88;
            margin-left: -5px;
        }
        .download-btn {
            position: fixed;
            bottom: 20px;
            background: #00ff88;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transition: 0.2s;
        }
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="icon-container" id="icon">
        <div class="glow-effect"></div>
        <div class="logo-text">
            <span class="R">R</span><span class="l">l</span>
        </div>
    </div>
    <button class="download-btn" onclick="download()">DOWNLOAD ICON</button>

    <script>
        function download() {
            html2canvas(document.querySelector("#icon"), {
                backgroundColor: null,
                scale: 2 // Higher resolution
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'icon.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
